version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    command: uv run uvicorn app.fast_api_app:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - backend
    command: uv run streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
